---
- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.{{HOMEPAGE_VAR_DOMAIN}}
        description: Media Server
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: {{HOMEPAGE_VAR_JELLYFIN_KEY}}
          enableBlocks: true
          enableNowPlaying: true

    - Nextcloud:
        icon: nextcloud.png
        href: https://nextcloud.{{HOMEPAGE_VAR_DOMAIN}}
        description: File Storage & Collaboration
        server: my-docker
        container: nextcloud-app
        widget:
          type: nextcloud
          url: http://nextcloud-app:80
          username: {{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}
          password: {{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}

    - Immich:
        icon: immich.png
        href: https://immich.{{HOMEPAGE_VAR_DOMAIN}}
        description: Photo & Video Backup
        server: my-docker
        container: immich_server
        widget:
          type: immich
          url: http://immich-server:2283
          key: {{HOMEPAGE_VAR_IMMICH_KEY}}
          version: 2

- Media Management:
    - Seerr:
        icon: seerr.png
        href: https://seerr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Media Requests
        server: my-docker
        container: seerr
        widget:
          type: seerr
          url: http://seerr:5055
          key: {{HOMEPAGE_VAR_JELLYSEERR_KEY}}

    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: TV Series
        server: my-docker
        container: sonarr
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: {{HOMEPAGE_VAR_SONARR_KEY}}

    - Radarr:
        icon: radarr.png
        href: https://radarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Movies
        server: my-docker
        container: radarr
        widget:
          type: radarr
          url: http://radarr:7878
          key: {{HOMEPAGE_VAR_RADARR_KEY}}

    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Subtitles
        server: my-docker
        container: bazarr
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: {{HOMEPAGE_VAR_BAZARR_KEY}}

    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Indexer Manager
        server: my-docker
        container: prowlarr
        widget:
          type: prowlarr
          url: http://prowlarr:9696
          key: {{HOMEPAGE_VAR_PROWLARR_KEY}}

    - qBittorrent:
        icon: qbittorrent.png
        href: https://qbit.{{HOMEPAGE_VAR_DOMAIN}}
        description: Torrent Client
        server: my-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://gluetun:8070
          username: {{HOMEPAGE_VAR_QBIT_USERNAME}}
          password: {{HOMEPAGE_VAR_QBIT_PASSWORD}}

- Monitor:
    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://kuma.{{HOMEPAGE_VAR_DOMAIN}}
        description: Uptime Monitor
        server: my-docker
        container: uptime-kuma
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: homepage

    - Scrutiny:
        icon: scrutiny.png
        href: https://scrutiny.{{HOMEPAGE_VAR_DOMAIN}}
        description: HDD S.M.A.R.T. Monitor
        server: my-docker
        container: scrutiny
        widget:
          type: scrutiny
          url: http://scrutiny:8080

    - Dozzle:
        icon: dozzle.png
        href: https://dozzle.{{HOMEPAGE_VAR_DOMAIN}}
