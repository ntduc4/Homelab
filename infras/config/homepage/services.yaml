---
- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.{{HOMEPAGE_VAR_DOMAIN}}
        description: Media Server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: {{HOMEPAGE_VAR_JELLYFIN_KEY}}
          enableBlocks: true
          enableNowPlaying: true

    - Jellyseerr:
        icon: jellyseerr.png
        href: https://seerr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Media Requests
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: {{HOMEPAGE_VAR_JELLYSEERR_KEY}}

    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: TV Series
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: {{HOMEPAGE_VAR_SONARR_KEY}}

    - Radarr:
        icon: radarr.png
        href: https://radarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Movies
        widget:
          type: radarr
          url: http://radarr:7878
          key: {{HOMEPAGE_VAR_RADARR_KEY}}

    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: {{HOMEPAGE_VAR_BAZARR_KEY}}

- Downloads:
    - qBittorrent:
        icon: qbittorrent.png
        href: https://qbit.{{HOMEPAGE_VAR_DOMAIN}}
        description: Torrent Client
        widget:
          type: qbittorrent
          url: http://gluetun:8070
          username: {{HOMEPAGE_VAR_QBIT_USERNAME}}
          password: {{HOMEPAGE_VAR_QBIT_PASSWORD}}

    - Prowlarr:
        icon: prowlarr.png
        href: https://prowlarr.{{HOMEPAGE_VAR_DOMAIN}}
        description: Indexer Manager
        widget:
          type: prowlarr
          url: http://gluetun:9696
          key: {{HOMEPAGE_VAR_PROWLARR_KEY}}

- Infrastructure:
    - Traefik:
        icon: traefik.png
        href: https://traefik.{{HOMEPAGE_VAR_DOMAIN}}
        description: Reverse Proxy
        widget:
          type: traefik
          url: http://traefik:8080

    - Dozzle:
        icon: dozzle.png
        href: https://dozzle.{{HOMEPAGE_VAR_DOMAIN}}
        description: Container Logs

- Productivity:
    - Nextcloud:
        icon: nextcloud.png
        href: https://nextcloud.{{HOMEPAGE_VAR_DOMAIN}}
        description: File Storage & Collaboration
        widget:
          type: nextcloud
          url: http://nextcloud-app:80
          username: {{HOMEPAGE_VAR_NEXTCLOUD_USERNAME}}
          password: {{HOMEPAGE_VAR_NEXTCLOUD_PASSWORD}}

    - Immich:
        icon: immich.png
        href: https://immich.{{HOMEPAGE_VAR_DOMAIN}}
        description: Photo & Video Backup
        widget:
          type: immich
          url: http://immich-server:2283
          key: {{HOMEPAGE_VAR_IMMICH_KEY}}
          version: 2
