        icon: traefik.png
        href: https://traefik.{{HOMEPAGE_VAR_DOMAIN}}
        description: Reverse Proxy
        server: my-docker
        container: traefik
        widget:
          type: traefik
          url: http://traefik:8080

    - Gluetun:
        icon: gluetun.png
        # href: https://qbit.yourdomain.com
        description: VPN Tunnel
        server: my-docker
        container: gluetun
