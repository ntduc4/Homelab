name: plex-server

networks:
  proxy:
    name: proxy

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      # - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      # - "8080:8080"                     # Traefik dashboard -> traefik.local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik:/traefik
      - ./config/traefik/certs:/certs
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./config/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${NORD_VPN_USERNAME}
      - OPENVPN_PASSWORD=${NORD_VPN_PASSWORD}
      - SERVER_COUNTRIES=Netherlands
    ports:
      # qbittorrent
      - 6881:6881/udp
      - 6881:6881
      - 8070:8070
      # radarr
      - 7878:7878
      # sonarr
      - 8989:8989
      # prowlarr
      - 9696:9696
      # jellyseerr
      - 5055:5055
      # flaresolverr
      - "${PORT:-8191}:8191"
      # readarr
      - 8787:8787
      # bazarr
      - 6767:6767
    networks:
      - proxy
    restart: unless-stopped
    # -----------------------------------------------------------------------
    # Traefik labels for ALL services that use network_mode: service:gluetun
    # Traefik reaches them through gluetun's network on their internal ports
    # -----------------------------------------------------------------------
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # qBittorrent -> qbit.local
      - "traefik.http.routers.qbit.rule=Host(`qbit.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.qbit.entrypoints=websecure"
      - "traefik.http.routers.qbit.tls=true"
      - "traefik.http.routers.qbit.service=qbit"
      - "traefik.http.services.qbit.loadbalancer.server.port=8070"

      # Radarr -> radarr.local
      - "traefik.http.routers.radarr.rule=Host(`radarr.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls=true"
      - "traefik.http.routers.radarr.service=radarr"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"

      # Sonarr -> sonarr.local
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.service=sonarr"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

      # Prowlarr -> prowlarr.local
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls=true"
      - "traefik.http.routers.prowlarr.service=prowlarr"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"

      # Jellyseerr -> seerr.local
      - "traefik.http.routers.seerr.rule=Host(`seerr.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls=true"
      - "traefik.http.routers.seerr.service=seerr"
      - "traefik.http.services.seerr.loadbalancer.server.port=5055"

      # Bazarr -> bazarr.local
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls=true"
      - "traefik.http.routers.bazarr.service=bazarr"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"

      # FlareSolverr -> flare.local
      - "traefik.http.routers.flare.rule=Host(`flare.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.flare.entrypoints=websecure"
      - "traefik.http.routers.flare.tls=true"
      - "traefik.http.routers.flare.service=flare"
      - "traefik.http.services.flare.loadbalancer.server.port=8191"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_PATH}:/media
    network_mode: "service:gluetun"
    restart: unless-stopped
    depends_on:
      - gluetun

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_PATH}:/media
    network_mode: "service:gluetun"
    restart: unless-stopped
    depends_on:
      - gluetun

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/prowlarr:/config
    network_mode: "service:gluetun"
    restart: unless-stopped
    depends_on:
      - gluetun

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8070
      - TORRENTING_PORT=6881
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_PATH}:/media
    network_mode: "service:gluetun"
    restart: unless-stopped
    depends_on:
      - gluetun

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    network_mode: "service:gluetun"
    volumes:
      - ./config/flaresolverr:/config
    restart: unless-stopped
    depends_on:
      - gluetun

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./config/bazarr:/config
      - ${MEDIA_PATH}/movies:/movies
      - ${MEDIA_PATH}/tv:/tv
    restart: unless-stopped
    depends_on:
      - gluetun

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./config/jellyfin:/config
      - ./jelly-cache:/cache
      - ${MEDIA_PATH}:/media
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    network_mode: "service:gluetun"
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Tashkent
      - PORT=5055
    volumes:
      - ./config/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    depends_on:
      - gluetun
